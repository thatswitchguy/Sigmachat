<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sigmachat Embed</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background-color: #36393f;
      color: #dcddde;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #chat-container {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    #chat-header {
      background-color: #2f3136;
      padding: 16px;
      border-bottom: 1px solid #202225;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #chat-header h3 {
      color: #ffffff;
      font-size: 16px;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      display: flex;
      gap: 12px;
      animation: slideIn 0.2s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #5865f2, #57f287);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: white;
      font-size: 14px;
      flex-shrink: 0;
    }

    .message-content {
      flex: 1;
    }

    .message-author {
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 4px;
    }

    .message-text {
      color: #dcddde;
      word-wrap: break-word;
    }

    .message-time {
      font-size: 12px;
      color: #72767d;
      margin-top: 4px;
    }

    #form {
      background-color: #2f3136;
      padding: 16px;
      border-top: 1px solid #202225;
    }

    #form form {
      display: flex;
      gap: 8px;
    }

    #input {
      flex: 1;
      background-color: #40444b;
      border: 1px solid #202225;
      color: #dcddde;
      padding: 12px;
      border-radius: 4px;
      font-size: 14px;
    }

    #input::placeholder {
      color: #72767d;
    }

    #input:focus {
      outline: none;
      border-color: #5865f2;
    }

    button[type="submit"] {
      background-color: #5865f2;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
      transition: background-color 0.2s;
    }

    button[type="submit"]:hover {
      background-color: #4752c4;
    }

    button[type="submit"]:active {
      transform: scale(0.98);
    }

    .login-notice {
      background-color: #2f3136;
      border: 1px solid #202225;
      border-radius: 4px;
      padding: 24px;
      text-align: center;
      margin: auto;
    }

    .login-notice h3 {
      color: #ffffff;
      margin-bottom: 12px;
    }

    .login-notice p {
      color: #b9bbbe;
      margin-bottom: 16px;
    }

    .login-link {
      display: inline-block;
      background-color: #5865f2;
      color: white;
      padding: 12px 24px;
      border-radius: 4px;
      text-decoration: none;
      font-weight: 500;
      transition: background-color 0.2s;
    }

    .login-link:hover {
      background-color: #4752c4;
    }
  </style>
</head>
<body>
  <div id="chat-container">
    <div id="chat-header">
      <h3>#general</h3>
      <span id="user-name" style="font-size: 14px; color: #b9bbbe;"></span>
    </div>
    <div id="messages"></div>
    <div id="form">
      <form>
        <input id="input" type="text" autocomplete="off" placeholder="Type a message..." maxlength="2000" />
        <button type="submit">Send</button>
      </form>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const messagesDiv = document.getElementById('messages');
    const inputField = document.getElementById('input');
    const form = document.querySelector('form');
    const userNameSpan = document.getElementById('user-name');

    let socket;
    let currentUser;
    let currentRoom = 'general';

    // Establish socket connection
    socket = io({
      reconnection: true,
      reconnectionDelay: 1000,
      reconnectionDelayMax: 5000,
      reconnectionAttempts: 5
    });

    socket.on('connect', () => {
      console.log('Connected to server');
    });

    socket.on('currentUser', (user) => {
      currentUser = user;
      userNameSpan.textContent = `Logged in as ${user}`;
      loadMessages();
    });

    socket.on('message', (message) => {
      if (message.room === currentRoom) {
        displayMessage(message);
        scrollToBottom();
      }
    });

    socket.on('loadMessages', (messages) => {
      messagesDiv.innerHTML = '';
      messages.forEach(displayMessage);
      scrollToBottom();
    });

    socket.on('disconnect', () => {
      console.log('Disconnected from server');
    });

    socket.on('connect_error', (error) => {
      console.error('Connection error:', error);
    });

    function displayMessage(message) {
      const messageEl = document.createElement('div');
      messageEl.className = 'message';
      
      const initial = message.user.charAt(0).toUpperCase();
      const colors = ['#5865f2', '#57f287', '#f04747', '#faa61a', '#43b581', '#6b82c8'];
      const bgColor = colors[message.user.charCodeAt(0) % colors.length];
      
      const now = new Date();
      const messageDate = new Date(message.date);
      let timeStr = messageDate.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
      
      if (messageDate.toDateString() !== now.toDateString()) {
        timeStr = messageDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' ' + timeStr;
      }

      messageEl.innerHTML = `
        <div class="message-avatar" style="background: linear-gradient(135deg, ${bgColor}, ${bgColor}99);">${initial}</div>
        <div class="message-content">
          <div class="message-author">${message.user}</div>
          <div class="message-text">${escapeHtml(message.message)}</div>
          <div class="message-time">${timeStr}</div>
        </div>
      `;
      
      messagesDiv.appendChild(messageEl);
    }

    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    function scrollToBottom() {
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function loadMessages() {
      socket.emit('loadMessages', currentRoom);
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      
      if (inputField.value.trim()) {
        socket.emit('sendMessage', {
          message: inputField.value,
          room: currentRoom
        });
        inputField.value = '';
        inputField.focus();
      }
    });

    // Load messages when the page loads
    window.addEventListener('load', () => {
      loadMessages();
    });
  </script>
</body>
</html>
