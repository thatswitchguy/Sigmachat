<!DOCTYPE html>
<html>
<head>
  <title>Sigmachat</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
  <div class="notification-container" id="notification-container"></div>
  <div id="chat-container">
    <div id="server-list">
      <div id="server-list-items"></div>
      <div class="server-divider"></div>
      <div class="server-icon add-server" id="add-server-btn" title="Add a Server">
        <span>+</span>
      </div>
    </div>

    <button id="expand-sidebar-btn" title="Expand Sidebar" style="display: none; position: absolute; left: 80px; top: 50%; transform: translateY(-50%); background: #2f3136; border: 1px solid #202225; color: #b5bac1; cursor: pointer; font-size: 16px; padding: 8px 4px; border-radius: 0 4px 4px 0; z-index: 100;">▶</button>
    <div id="sidebar">
      <div id="sidebar-header">
        <h3 id="server-name">Sigmachat</h3>
        <div style="display: flex; gap: 8px;">
          <button id="server-invite-btn" title="Copy Invite Link" onclick="copyInviteLink()" style="background: none; border: none; color: #b5bac1; cursor: pointer; padding: 4px;"><img src="https://cdn-icons-png.flaticon.com/512/1617/1617543.png" style="width: 20px; height: 20px;"></button>
          <button id="collapse-sidebar-btn" title="Collapse Sidebar" style="background: none; border: none; color: #b5bac1; cursor: pointer; font-size: 18px; padding: 4px 8px;">◀</button>
          <button id="server-settings-btn" title="Server Settings" style="display: none;"><img src="https://cdn-icons-png.freepik.com/512/1827/1827849.png" style="width: 20px; height: 20px;"></button>
        </div>
      </div>
      <div id="channel-section">
        <div class="channel-header">
          <span>TEXT CHANNELS</span>
          <button id="add-channel-btn" title="Create Channel" style="display: none;">+</button>
        </div>
        <div id="channel-list"></div>
      </div>
      
      <div id="dm-section">
        <div id="dm-header">
          <h3>Direct Messages</h3>
        </div>
        <div id="online-users">
          <div id="online-user-list"></div>
        </div>
      </div>

      <div id="user-panel">
        <div id="user-info">
          <div id="user-avatar"></div>
          <span id="user-name-display"></span>
        </div>
        <div id="user-controls">
          <button id="admin-control-btn" title="Admin Control" style="display: none;"><img src="https://cdn-icons-png.flaticon.com/512/2099/2099058.png" style="width: 20px; height: 20px;"></button>
          <button id="account-btn" title="Account Settings"><img src="https://cdn-icons-png.freepik.com/512/16273/16273713.png?ga=GA1.1.1935462930.1765644592" style="width: 20px; height: 20px;"></button>
        </div>
      </div>
    </div>

    <div id="main-chat">
      <div id="chat-header">
        <h3 id="current-room">#general</h3>
        <div id="header-actions">
          <button id="logout-btn">Logout</button>
        </div>
      </div>
      <div id="messages"></div>
      <button id="scroll-down-btn" title="Scroll to latest messages">↓</button>
      <div id="form">
        <form>
          <div class="plus-container">
            <button type="button" id="plus-btn" title="Expand options" style=" width: 50px height: 30px;">
              <img src="/assets/151861-removebg-preview_1768843048150.png" alt="Add" style=" width: 20px; height: 20px;">
            </button>
            <div id="plus-options">
              <button type="button" class="option-btn" id="upload-option">
                <img src="/assets/10254377-removebg-preview_1768843041746.png" alt="Upload">
                Upload Image/Video
              </button>
              <button type="button" class="option-btn" id="poll-option">
                <img src="/assets/bulleted_9357359_1768843161915.png" alt="Poll">
                Create Poll
              </button>
              <button type="button" class="option-btn" id="youtube-option">
                <img src="/assets/youtube_281783_1768843356809.png" alt="YouTube">
                YouTube Watch Link
              </button>
            </div>
          </div>
          <input type="file" id="image-upload" accept="image/*,video/*" style="display: none;">
          <textarea id="input" autocomplete="off" placeholder="Message #general" maxlength="2000"></textarea>
          <button type="submit">Send</button>
        </form>
      </div>
    </div>
  </div>

  <div id="confirm-notification-overlay" class="modal-overlay" style="display: none;">
    <div id="confirm-notification" class="modal" style="display: none; max-width: 400px;">
      <div class="modal-header">
        <h2 id="confirm-title">Confirm Action</h2>
        <button class="modal-close" onclick="closeConfirmNotification()">&times;</button>
      </div>
      <div class="modal-body">
        <p id="confirm-message"></p>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary modal-cancel" onclick="closeConfirmNotification()">Cancel</button>
        <button class="btn-danger" id="confirm-ok-btn">OK</button>
      </div>
    </div>
  </div>

  <div id="modal-overlay" class="modal-overlay" style="display: none;">
    <div id="create-server-modal" class="modal" style="display: none;">
      <div class="modal-header">
        <h2>Create a Server</h2>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Server Name</label>
          <input type="text" id="new-server-name" placeholder="My Awesome Server" maxlength="50">
        </div>
        <div class="form-group">
          <label>Server Icon URL (optional)</label>
          <input type="url" id="new-server-icon" placeholder="https://example.com/icon.png">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary modal-cancel">Cancel</button>
        <button class="btn-primary" id="create-server-submit">Create Server</button>
      </div>
    </div>

    <div id="create-channel-modal" class="modal" style="display: none;">
      <div class="modal-header">
        <h2>Create Channel</h2>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Channel Name</label>
          <input type="text" id="new-channel-name" placeholder="new-channel" maxlength="30">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary modal-cancel">Cancel</button>
        <button class="btn-primary" id="create-channel-submit">Create Channel</button>
      </div>
    </div>

    <div id="server-settings-modal" class="modal" style="display: none;">
      <div class="modal-header">
        <h2>Server Settings</h2>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Server Name</label>
          <input type="text" id="edit-server-name" maxlength="50">
        </div>
        <div class="form-group">
          <label>Server Icon</label>
          <div style="display: flex; gap: 8px; align-items: center;">
            <input type="url" id="edit-server-icon" placeholder="https://example.com/icon.png" style="flex: 1;">
            <input type="file" id="server-icon-upload" accept="image/*" style="display: none;">
            <button type="button" class="btn-secondary" onclick="document.getElementById('server-icon-upload').click()">Upload</button>
          </div>
        </div>
        <div class="danger-zone">
          <!-- Remember to change image-->
          <h3>Really look at this stuff </h3>
          <button class="btn-danger" id="delete-server-btn">Delete Server</button>
          <button class="btn-secondary" id="leave-server-btn">Leave Server</button>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary modal-cancel">Cancel</button>
        <button class="btn-primary" id="save-server-settings">Save Changes</button>
      </div>
    </div>
    <div id="edit-channel-modal" class="modal" style="display: none;">
      <div class="modal-header">
        <h2>Edit Channel</h2>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Channel Name</label>
          <input type="text" id="edit-channel-name-input" placeholder="channel-name" maxlength="30">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary modal-cancel">Cancel</button>
        <button class="btn-primary" id="edit-channel-submit">Save Changes</button>
      </div>
    </div>

    <div id="poll-modal" class="modal" style="display: none;">
      <div class="modal-header">
        <h2>Create Poll</h2>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Question</label>
          <input type="text" id="poll-question-input" placeholder="What's on your mind?" maxlength="100">
        </div>
        <div class="form-group">
          <label>Options</label>
          <div id="poll-options-container">
            <div class="poll-option-input-group">
              <input type="text" class="poll-option-input" placeholder="Option 1" maxlength="50">
            </div>
            <div class="poll-option-input-group">
              <input type="text" class="poll-option-input" placeholder="Option 2" maxlength="50">
            </div>
          </div>
          <button type="button" class="btn-secondary" id="add-poll-option-btn" style="margin-top: 8px;">+ Add Option</button>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary modal-cancel">Cancel</button>
        <button class="btn-primary" id="poll-submit">Create Poll</button>
      </div>
    </div>
  </div>

    <div id="youtube-modal" class="modal" style="display: none;">
      <div class="modal-header">
        <h2>Watch YouTube</h2>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>YouTube Link</label>
          <input type="url" id="youtube-link-input" placeholder="https://www.youtube.com/watch?v=..." maxlength="200">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary modal-cancel">Cancel</button>
        <button class="btn-primary" id="youtube-submit">Add Video</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/client.js"></script>
</body>
</html>
