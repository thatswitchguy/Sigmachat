
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Sigmachat</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="login-container">
    <div>
      <h2>Create Account</h2>
      <p style="color: #b9bbbe; margin-bottom: 30px; text-align: center;">Join the community!</p>
      <form action="/register" method="post">
        <input type="text" name="username" placeholder="Username" required minlength="3" maxlength="20" />
        <input type="password" name="password" placeholder="Password" required minlength="6" />
        <input type="password" name="confirmPassword" placeholder="Confirm Password" required minlength="6" />
        <button type="submit">Create Account</button>
      </form>
      <p style="color: #b9bbbe; margin-top: 20px; text-align: center;">
        Already have an account? <a href="/login" style="color: #00aff4; text-decoration: none;">Log in here</a>
      </p>
    </div>
  </div>
</body>
</html>
